<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 | 陈义的技术博客</title>
    <meta name="description" content="抱歉，您访问的页面不存在">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const theme = savedTheme === 'light' ? 'light' : 'dark';
            if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen overflow-hidden">
    <canvas id="particles"></canvas>
    
    <div class="min-h-screen flex items-center justify-center px-4 relative z-10">
        <div class="text-center">
            <div class="animate-float mb-8">
                <div class="text-9xl font-bold text-cyan-400 opacity-20">404</div>
            </div>
            
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">
                页面走丢了
            </h1>
            
            <p class="text-gray-400 text-lg mb-8">
                抱歉，您访问的页面不存在或已被移除
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="index.html" class="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold rounded-lg hover:from-cyan-400 hover:to-blue-500 transition-all transform hover:scale-105">
                    返回首页
                </a>
                <a href="javascript:history.back()" class="px-8 py-3 bg-gray-800 text-white font-semibold rounded-lg hover:bg-gray-700 transition-all border border-gray-700">
                    返回上页
                </a>
            </div>
            
            <p class="text-gray-500 text-sm mt-8">
                <span id="countdown">5</span> 秒后自动返回首页...
            </p>
        </div>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
