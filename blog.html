<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | DevConsole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            primary: '#00f5ff',
                            secondary: '#ff00ff',
                            accent: '#39ff14',
                            dark: '#0a0a0f',
                            panel: '#1a1a2e'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen overflow-x-hidden transition-colors duration-500">
    <canvas id="particles"></canvas>
    <div id="cursor-glow"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md border-b transition-colors duration-500">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                <span class="text-cyan-400 font-mono text-lg">开发者控制台</span>
            </a>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-10 px-4 max-w-5xl mx-auto relative z-10">
        <div class="mb-8">
            <a href="index.html" class="inline-flex items-center text-cyan-400 hover:text-cyan-300 transition-colors mb-4">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                返回控制台
            </a>
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">
                <span class="text-purple-400">&gt;</span> Blog
            </h1>
            <p class="text-gray-400 font-mono text-sm">技术文章与思考分享</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <button class="filter-btn active px-4 py-2 rounded-lg bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 text-sm font-mono transition-all hover:bg-cyan-500/30" data-filter="all">
                全部
            </button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-400 border border-gray-700 text-sm font-mono transition-all hover:bg-gray-700" data-filter="agv">
                AGV
            </button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-400 border border-gray-700 text-sm font-mono transition-all hover:bg-gray-700" data-filter="运维">
                运维
            </button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-400 border border-gray-700 text-sm font-mono transition-all hover:bg-gray-700" data-filter="前端">
                前端
            </button>
        </div>

        <div class="panel-card text-center py-16">
            <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-gray-800/50 flex items-center justify-center">
                <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">暂无文章</h3>
            <p class="text-gray-400 text-sm mb-6">博客文章正在准备中，敬请期待...</p>
            <div class="inline-flex items-center text-cyan-400 text-sm">
                <svg class="w-4 h-4 mr-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                内容更新中
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
