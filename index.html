<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈义 | 技术博客</title>
    <script>
        // 在页面渲染前立即应用主题，防止闪烁
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || !savedTheme) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen overflow-x-hidden transition-colors duration-500">
    <canvas id="particles"></canvas>
    
    <div id="cursor-glow"></div>

    <header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md border-b transition-colors duration-500">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                <span class="text-cyan-400 font-mono text-lg">陈义 | 技术博客</span>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>
                <div class="text-xs text-gray-400 font-mono hidden sm:block">
                    <span id="current-time"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-20 pb-10 px-4 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <a href="resume.html" class="group panel-card">
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <span class="status-badge online">在线</span>
                </div>
                <h2 class="text-xl font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">简历</h2>
                <p class="text-gray-400 text-sm mb-4">个人简历与技能展示</p>
                <div class="flex items-center text-cyan-400 text-sm font-mono">
                    <span>访问模块</span>
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </a>

            <a href="blog.html" class="group panel-card">
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                        </svg>
                    </div>
                    <span class="status-badge active">3 篇</span>
                </div>
                <h2 class="text-xl font-bold text-white mb-2 group-hover:text-purple-400 transition-colors">博客</h2>
                <p class="text-gray-400 text-sm mb-4">技术文章与思考分享</p>
                <div class="flex items-center text-purple-400 text-sm font-mono">
                    <span>浏览文章</span>
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </a>

            <a href="projects.html" class="group panel-card">
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-green-500 to-teal-600 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                        </svg>
                    </div>
                    <span class="status-badge running">2 个</span>
                </div>
                <h2 class="text-xl font-bold text-white mb-2 group-hover:text-green-400 transition-colors">项目</h2>
                <p class="text-gray-400 text-sm mb-4">开源项目与作品集</p>
                <div class="flex items-center text-green-400 text-sm font-mono">
                    <span>查看项目</span>
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </a>

            <a href="contact.html" class="group panel-card">
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <span class="status-badge standby">就绪</span>
                </div>
                <h2 class="text-xl font-bold text-white mb-2 group-hover:text-orange-400 transition-colors">联系</h2>
                <p class="text-gray-400 text-sm mb-4">联系方式与社交链接</p>
                <div class="flex items-center text-orange-400 text-sm font-mono">
                    <span>建立连接</span>
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="panel-card">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full mr-2 animate-pulse"></span>
                    技能熟练度
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">AGV系统运维</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full progress-bar" style="width: 85%"></div>
                            </div>
                            <span class="text-cyan-400 text-xs font-mono">85%</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">设备调试</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full progress-bar" style="width: 80%"></div>
                            </div>
                            <span class="text-purple-400 text-xs font-mono">80%</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">Linux</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-green-500 to-teal-500 rounded-full progress-bar" style="width: 60%"></div>
                            </div>
                            <span class="text-green-400 text-xs font-mono">60%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-card">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                    <span class="w-2 h-2 bg-orange-400 rounded-full mr-2 animate-pulse"></span>
                    语言熟练度
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">HTML</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-orange-500 to-red-500 rounded-full progress-bar" style="width: 72.1%"></div>
                            </div>
                            <span class="text-orange-400 text-xs font-mono">72.1%</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">CSS</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-purple-500 to-indigo-500 rounded-full progress-bar" style="width: 16.4%"></div>
                            </div>
                            <span class="text-purple-400 text-xs font-mono">16.4%</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">JavaScript</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-yellow-500 to-amber-500 rounded-full progress-bar" style="width: 11.5%"></div>
                            </div>
                            <span class="text-yellow-400 text-xs font-mono">11.5%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <section class="panel-card mb-6">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                快速统计
            </h3>
            <div class="grid grid-cols-3 gap-4">
                <div class="text-center p-3 bg-gray-800/50 rounded-lg">
                    <div class="text-2xl font-bold text-cyan-400 counter" data-target="2">0</div>
                    <div class="text-xs text-gray-400">参与项目</div>
                </div>
                <div class="text-center p-3 bg-gray-800/50 rounded-lg">
                    <div class="text-2xl font-bold text-purple-400 counter" data-target="3">0</div>
                    <div class="text-xs text-gray-400">博客文章</div>
                </div>
                <div class="text-center p-3 bg-gray-800/50 rounded-lg">
                    <div class="text-2xl font-bold text-green-400 counter" data-target="4">0</div>
                    <div class="text-xs text-gray-400">年工作经验</div>
                </div>
            </div>
        </section>

    </main>

    <footer class="border-t border-gray-800 py-6 text-center">
        <p class="text-gray-500 text-sm font-mono">
            © 2026 陈义 | 技术博客 | 用 <span class="text-red-400">🤯</span> 和代码构建
        </p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
