<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈义 | 技术博客</title>
    <script>
        // 在页面渲染前立即应用主题，防止闪烁 
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || !savedTheme) {
                document.documentElement.classList.add('dark');
            }
            
            // 检查是否已经访问过欢迎页面
            const hasVisited = localStorage.getItem('hasVisitedWelcome');
            if (!hasVisited) {
                localStorage.setItem('hasVisitedWelcome', 'true');
                window.location.href = 'welcome.html';
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen overflow-x-hidden transition-colors duration-500">
    <canvas id="particles"></canvas>
    <div id="cursor-glow"></div>

    <header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md border-b transition-colors duration-500">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                <span class="text-cyan-400 font-mono text-lg">陈义 | 技术博客</span>
            </a>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-10 px-4 max-w-5xl mx-auto relative z-10">
        <div class="mb-8">
            <a href="index.html" class="inline-flex items-center text-cyan-400 hover:text-cyan-300 transition-colors mb-4">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                返回主页
            </a>
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">
                <span class="text-orange-400">&gt;</span> Contact
            </h1>
            <p class="text-gray-400 font-mono text-sm">与我取得联系</p>
        </div>

        <div class="space-y-4 mb-8">
            <div class="contact-link group flex items-center">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center mr-4">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.269-.03-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
                    </svg>
                </div>
                <div class="flex-1 cursor-pointer" id="wechat-copy">
                    <h3 class="text-white font-semibold group-hover:text-cyan-400 transition-colors">微信</h3>
                    <p class="text-gray-400 text-sm">_o_Orange_</p>
                </div>
                <button id="wechat-qr-btn" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all ml-2" title="显示二维码">
                    <svg class="w-5 h-5 text-gray-400 hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                    </svg>
                </button>
            </div>

            <a href="javascript:void(0)" class="contact-link group" id="email-link">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mr-4">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    <h3 class="text-white font-semibold group-hover:text-cyan-400 transition-colors">邮箱</h3>
                    <p class="text-gray-400 text-sm">695714679@qq.com</p>
                </div>
                <svg class="w-5 h-5 text-gray-500 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>

            <a href="https://github.com/isvcy" target="_blank" class="contact-link group">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-gray-600 to-gray-800 flex items-center justify-center mr-4">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <h3 class="text-white font-semibold group-hover:text-cyan-400 transition-colors">GitHub</h3>
                    <p class="text-gray-400 text-sm">@isvcy</p>
                </div>
                <svg class="w-5 h-5 text-gray-500 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </div>

        <div class="panel-card">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                    位置
                </h3>
            <div class="bg-gray-800/50 rounded-lg h-64 flex items-center justify-center border border-gray-700">
                <div class="text-center">
                    <svg class="w-12 h-12 text-cyan-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <p class="text-white font-semibold">江苏省宿迁市</p>
                    <p class="text-gray-400 text-sm">暂不支持远程工作</p>
                </div>
            </div>
        </div>
    </main>

    <div id="wechat-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-gray-900 rounded-2xl p-6 max-w-sm mx-4 border border-gray-700 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white">微信二维码</h3>
                <button onclick="closeWechatQR()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="bg-white rounded-lg p-4 mb-4">
                <img src="" data-src="img/wx.jpg" alt="微信二维码" class="w-full h-auto lazyload">
            </div>
            <p class="text-gray-400 text-sm text-center">扫描二维码添加微信好友</p>
            <p class="text-cyan-400 text-sm text-center mt-1">微信号：_o_Orange_</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('wechat-copy').addEventListener('click', copyWechat);
        document.getElementById('wechat-qr-btn').addEventListener('click', showWechatQR);
        document.getElementById('email-link').addEventListener('click', copyEmail);

        function copyWechat() {
            const wechat = '_o_Orange_';
            navigator.clipboard.writeText(wechat).then(() => {
                showToast('微信号已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
                showToast('复制失败，请手动复制');
            });
        }

        function showWechatQR() {
            const modal = document.getElementById('wechat-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeWechatQR() {
            const modal = document.getElementById('wechat-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('wechat-modal').addEventListener('click', (e) => {
            if (e.target.id === 'wechat-modal') {
                closeWechatQR();
            }
        });

        function copyEmail() {
            const email = '695714679@qq.com';
            navigator.clipboard.writeText(email).then(() => {
                showToast('邮箱地址已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
                showToast('复制失败，请手动复制');
            });
        }

        function showToast(message) {
            const existingToast = document.getElementById('toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'fixed top-24 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 font-medium';
            toast.textContent = message;
            toast.style.animation = 'fadeInOut 2s ease';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
    <style>
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</body>
</html>
