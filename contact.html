        function showToast(message) {
            const existingToast = document.getElementById('toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'fixed top-24 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 font-medium';
            toast.textContent = message;
            toast.style.animation = 'fadeInOut 2s ease';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // 动态粒子位置效果
        class LocationParticles {
            constructor() {
                this.canvas = document.getElementById('location-particles');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('location-canvas');
                this.particles = [];
                this.animationFrame = null;
                this.init();
            }

            init() {
                this.resize();
                this.createParticles();
                this.animate();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.canvas.style.width = rect.width + 'px';
                this.canvas.style.height = rect.height + 'px';
                this.width = rect.width;
                this.height = rect.height;
                
                // 重新计算城市位置（基于新尺寸）
                this.recalculatePositions();
            }

            recalculatePositions() {
                const centerX = this.width / 2;
                const centerY = this.height / 2;
                
                // 根据容器宽度动态调整偏移量（响应式）
                const isMobile = this.width < 400;
                const scale = isMobile ? 0.5 : 1;
                
                // 基于中国地图的相对位置（以宿迁为中心）
                const cityOffsets = [
                    { name: '宿迁', offsetX: 0, offsetY: 0, isHome: true },
                    { name: '南京', offsetX: -120 * scale, offsetY: 90 * scale },
                    { name: '扬州', offsetX: -45 * scale, offsetY: 60 * scale },
                    { name: '启东', offsetX: 120 * scale, offsetY: 105 * scale },
                    { name: '上海', offsetX: 90 * scale, offsetY: 165 * scale },
                    { name: '苏州', offsetX: 60 * scale, offsetY: 142 * scale },
                    { name: '昆山', offsetX: 75 * scale, offsetY: 150 * scale },
                    { name: '安徽', offsetX: -270 * scale, offsetY: 45 * scale },
                    { name: '北京', offsetX: 0, offsetY: -210 * scale }
                ];

                // 更新粒子位置
                this.particles.forEach((particle, index) => {
                    if (cityOffsets[index]) {
                        const offset = cityOffsets[index];
                        const newX = centerX + offset.offsetX;
                        const newY = centerY + offset.offsetY;
                        
                        particle.baseX = newX;
                        particle.baseY = newY;
                        
                        // 立即更新所有粒子的位置（不只是中心粒子）
                        particle.x = newX;
                        particle.y = newY;
                        
                        // 更新城市信息
                        particle.name = offset.name;
                        particle.isHome = offset.isHome;
                    }
                });
            }

            createParticles() {
                const centerX = this.width / 2;
                const centerY = this.height / 2;
                const isMobile = this.width < 400;
                const scale = isMobile ? 0.5 : 1;
                
                // 基于中国地图的相对位置（以宿迁为中心）
                const cityOffsets = [
                    { name: '宿迁', offsetX: 0, offsetY: 0, isHome: true },
                    { name: '南京', offsetX: -120 * scale, offsetY: 90 * scale },
                    { name: '扬州', offsetX: -45 * scale, offsetY: 60 * scale },
                    { name: '启东', offsetX: 120 * scale, offsetY: 105 * scale },
                    { name: '上海', offsetX: 90 * scale, offsetY: 165 * scale },
                    { name: '苏州', offsetX: 60 * scale, offsetY: 142 * scale },
                    { name: '昆山', offsetX: 75 * scale, offsetY: 150 * scale },
                    { name: '安徽', offsetX: -270 * scale, offsetY: 45 * scale },
                    { name: '北京', offsetX: 0, offsetY: -210 * scale }
                ];
                
                this.particles = [];
                cityOffsets.forEach((offset) => {
                    const particle = {
                        x: centerX + offset.offsetX,
                        y: centerY + offset.offsetY,
                        baseX: centerX + offset.offsetX,
                        baseY: centerY + offset.offsetY,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        radius: offset.isHome ? (isMobile ? 4 : 5) : (isMobile ? 2 : 3),
                        color: offset.isHome ? '#4ade80' : '#22c55e',
                        name: offset.name,
                        isHome: offset.isHome,
                        angle: Math.random() * Math.PI * 2,
                        speed: 0.005 + Math.random() * 0.01
                    };
                    this.particles.push(particle);
                });
            }

            drawConnections() {
                const homeParticle = this.particles.find(p => p.isHome);
                if (!homeParticle) return;

                const isDarkMode = document.documentElement.classList.contains('dark');
                this.ctx.strokeStyle = isDarkMode ? 'rgba(74, 222, 128, 0.15)' : 'rgba(34, 197, 94, 0.3)';
                this.ctx.lineWidth = 1;

                this.particles.forEach(particle => {
                    if (particle.isHome) return;

                    const dx = homeParticle.x - particle.x;
                    const dy = homeParticle.y - particle.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // 始终绘制连接线，不受距离限制
                    this.ctx.beginPath();
                    this.ctx.moveTo(homeParticle.x, homeParticle.y);
                    this.ctx.lineTo(particle.x, particle.y);
                    this.ctx.stroke();

                    // 绘制流动的光点
                    const progress = (Date.now() * 0.001) % 1;
                    const flowX = homeParticle.x + dx * progress;
                    const flowY = homeParticle.y + dy * progress;

                    this.ctx.fillStyle = isDarkMode ? 'rgba(74, 222, 128, 0.6)' : 'rgba(34, 197, 94, 0.8)';
                    this.ctx.beginPath();
                    this.ctx.arc(flowX, flowY, 1.5, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            drawParticles() {
                this.particles.forEach(particle => {
                    // 只有非中心位置的粒子才会移动
                    if (!particle.isHome) {
                        // 添加随机运动（减小幅度）
                        particle.angle += particle.speed * 0.5;
                        
                        // 围绕基础位置做小幅度摆动
                        const offsetX = Math.cos(particle.angle) * 3;
                        const offsetY = Math.sin(particle.angle) * 3;
                        
                        particle.x = particle.baseX + offsetX;
                        particle.y = particle.baseY + offsetY;
                    }

                    // 绘制光晕
                    const gradient = this.ctx.createRadialGradient(
                        particle.x, particle.y, 0,
                        particle.x, particle.y, particle.radius * 3
                    );
                    gradient.addColorStop(0, particle.color + '40');
                    gradient.addColorStop(1, 'transparent');

                    this.ctx.fillStyle = gradient;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.radius * 3, 0, Math.PI * 2);
                    this.ctx.fill();

                    // 绘制粒子
                    this.ctx.fillStyle = particle.color;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                    this.ctx.fill();

                    // 绘制城市名称
                    if (!particle.isHome) {
                        const isDarkMode = document.documentElement.classList.contains('dark');
                        const isMobile = this.width < 400;
                        this.ctx.fillStyle = isDarkMode ? 'rgba(156, 163, 175, 0.8)' : 'rgba(55, 65, 81, 0.9)';
                        this.ctx.font = isMobile ? '9px sans-serif' : '11px sans-serif';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(particle.name, particle.x, particle.y - 8);
                    }
                });
            }

            animate() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.drawConnections();
                this.drawParticles();
                this.animationFrame = requestAnimationFrame(() => this.animate());
            }

            destroy() {
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                }
            }
        }

        // 初始化位置粒子效果
