<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 | 陈义的技术博客</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || !savedTheme) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        
        .animate-pulse-custom {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: currentColor;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden transition-colors duration-500">
    <canvas id="particles"></canvas>
    
    <div class="min-h-screen flex items-center justify-center px-4 relative z-10">
        <div class="text-center max-w-2xl">
            <div class="animate-fade-in opacity-0">
                <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center animate-float">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
            </div>
            
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-4 animate-fade-in opacity-0 delay-100">
                欢迎来到
            </h1>
            
            <h2 class="text-3xl md:text-5xl font-bold text-cyan-400 mb-6 animate-fade-in opacity-0 delay-200">
                我的技术博客
            </h2>
            
            <p class="text-gray-400 text-lg md:text-xl mb-8 animate-fade-in opacity-0 delay-300">
                <span id="typing-text"></span><span class="typing-cursor"></span>
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center animate-fade-in opacity-0 delay-400">
                <a href="index.html" class="group px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold rounded-lg hover:from-cyan-400 hover:to-blue-500 transition-all transform hover:scale-105 shadow-lg animate-pulse-custom">
                    <span class="flex items-center">
                        开始探索
                        <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </span>
                </a>
                
                <a href="resume.html" class="px-8 py-4 bg-gray-800 text-white font-semibold rounded-lg hover:bg-gray-700 transition-all transform hover:scale-105 border border-gray-700">
                    查看简历
                </a>
            </div>
            
            <div class="mt-12 animate-fade-in opacity-0 delay-500">
                <p class="text-gray-500 text-sm">
                    前端开发 · 全栈工程师 · 技术爱好者
                </p>
            </div>
        </div>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        const texts = [
            '代码是写给机器的情书',
            '每一行都是爱的告白',
            '在0和1的世界里',
            '编织着最浪漫的梦',
            'bug是调皮的小精灵',
            '需要温柔的耐心去寻找',
            '每一次修复都是和解',
            '让代码重新绽放笑容',
            '技术是通往星辰的路',
            '每一步都踏着星光',
            '在逻辑的森林里迷路',
            '在算法的海洋里航行',
            '但心中永远有指南针',
            '那就是对技术的热爱',
            '编译是心跳的节奏',
            '运行是梦想的飞翔',
            '每一个bug都是成长的礼物',
            '每一次成功都是闪亮的勋章',
            '在代码的国度里',
            '每一个字符都是音符',
            '谱写着动人的乐章',
            '技术不是冰冷的工具',
            '而是温暖的拥抱',
            '传递着爱与希望',
            '这就是技术的浪漫',
            '也是每一个人的诗篇',
            '在星空下继续书写',
            '未来的故事更加精彩'
        ];
        const typingElement = document.getElementById('typing-text');
        const cursorElement = document.querySelector('.typing-cursor');
        let currentIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeWriter() {
            const currentText = texts[currentIndex];
            
            if (isDeleting) {
                if (charIndex > 0) {
                    typingElement.textContent = currentText.substring(0, charIndex - 1);
                    charIndex--;
                    setTimeout(typeWriter, 50);
                } else {
                    isDeleting = false;
                    currentIndex = (currentIndex + 1) % texts.length;
                    charIndex = 0;
                    setTimeout(typeWriter, 500);
                }
            } else {
                if (charIndex < currentText.length) {
                    typingElement.textContent += currentText.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 100);
                } else {
                    setTimeout(() => {
                        isDeleting = true;
                        typeWriter();
                    }, 2000);
                }
            }
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeWriter, 800);
        });
    </script>
</body>
</html>
